name: CI - Lint, Type Integrity and Test

on:
  push:
    branches: [ main, feature/reoganize_better_practices ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # This enables the cache: it checks for changes in requirements.txt
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install -r requirements.txt
      
      # Linter
      - name: Run Linter (Ruff)
        run: ruff check .
      # Type Checker
      - name: Run Pyright
        uses: jakebailey/pyright-action@v2
        with:
          annotate: all
          warnings: false
          lib: false
          no-comments: false
      # Test Runner (Pytest)
      - name: Run Tests (Pytest)
        run: pytest